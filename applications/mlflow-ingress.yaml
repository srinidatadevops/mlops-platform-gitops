apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow-ingress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/srinidatadevops/mlops-platform-gitops.git
    targetRevision: main
    path: platform/mlflow/manifests
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
