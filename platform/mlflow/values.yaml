# MLflow server — community-charts/mlflow.
# Image left to chart default (burakince/mlflow) — it ships psycopg2 baked in,
# which the upstream ghcr.io/mlflow/mlflow image does not.

# Backend store: bundled Bitnami PostgreSQL sub-chart wires itself in
# when postgresql.enabled=true below. Do NOT also set backendStore.postgres.enabled
# (chart schema requires them to be mutually exclusive).
backendStore:
  databaseMigration: true

# Artifact storage: S3 (Pod Identity provides credentials — no keys in env vars)
artifactRoot:
  s3:
    enabled: true
    bucket: mlflow-artifacts-803031032486
    path: ""

# Service account — must match the Pod Identity Association in Terraform
serviceAccount:
  create: true
  name: mlflow
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# Bundled PostgreSQL sub-chart.
# Override image registry to bitnamilegacy/* — Bitnami removed free images
# from docker.io/bitnami in late 2025; the archive mirror lives at
# docker.io/bitnamilegacy and is publicly pullable.
postgresql:
  enabled: true
  global:
    security:
      # Required to use the bitnamilegacy archive registry (not the new
      # "Bitnami Secure Images" set). Acceptable for dev; for prod, pin to
      # a Bitnami Premium tag, swap to CloudNativePG/Zalando, or use RDS.
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  auth:
    username: mlflow
    password: change-this-after-testing
    database: mlflow
  primary:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: gp3
    resources:
      requests:
        cpu: 50m
        memory: 128Mi

# No built-in ingress — we'll create an ALB Ingress separately for clarity
ingress:
  enabled: false

service:
  type: ClusterIP
  port: 5000
