prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        memory: 2Gi

grafana:
  persistence:
    enabled: true
    size: 5Gi
  adminPassword: admin   # change after first login
  resources:
    requests:
      cpu: 50m
      memory: 100Mi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 100Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 100Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 30m
      memory: 50Mi
